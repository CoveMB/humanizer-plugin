name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check whitespace
        run: git diff --check

      - name: Run tests
        run: make test

      - name: Check eval matrix
        run: make eval-humanizer-dry-run
